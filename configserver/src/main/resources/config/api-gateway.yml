spring:
  application:
    name: API-GATEWAY
  
  security:
    oauth2:
      resourceserver:
        jwt:
          # issuer-uri: http://localhost:8080/auth/realms/fitnessrealm
          jwk-set-uri: http://localhost:8181/realms/fitness-oauth2/protocol/openid-connect/certs

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: lb://USER-SERVICE
              predicates:
                - Path=/api/users/**

            - id: activity-service
              uri: lb://ACTIVITY-SERVICE
              predicates:
                - Path=/api/activities/**

            - id: ai-service
              uri: lb://AI-SERVICE
              predicates:
                - Path=/api/recommendations/**

server:
  port: 8080

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: gateway
logging:
  level:
    org.springframework.cloud.gateway.route.RouteDefinitionRouteLocator: TRACE