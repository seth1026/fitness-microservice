services:

  # ─────────────────────────────────────────────
  # INFRASTRUCTURE
  # ─────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: fitness-postgres
    environment:
      POSTGRES_DB: fitness_user_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fitness-network

  mongodb:
    image: mongo:7-jammy
    container_name: fitness-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fitness-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: fitness-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fitness-network

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: fitness-keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/fitness_user_db
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
    ports:
      - "8181:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fitness-network

  # ─────────────────────────────────────────────
  # PLATFORM SERVICES
  # ─────────────────────────────────────────────

  eureka:
    build:
      context: ./eureka
      dockerfile: Dockerfile
    container_name: fitness-eureka
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8761/actuator/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - fitness-network

  configserver:
    build:
      context: ./configserver
      dockerfile: Dockerfile
    container_name: fitness-configserver
    ports:
      - "8888:8888"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
    depends_on:
      eureka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8888/actuator/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - fitness-network

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: fitness-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://configserver:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/fitness-oauth2/protocol/openid-connect/certs
    depends_on:
      configserver:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - fitness-network

  userservice:
    build:
      context: ./userservice
      dockerfile: Dockerfile
    container_name: fitness-userservice
    ports:
      - "8081:8081"
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://configserver:8888
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/fitness_user_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
    depends_on:
      postgres:
        condition: service_healthy
      configserver:
        condition: service_healthy
    networks:
      - fitness-network

  activityservice:
    build:
      context: ./activityservice
      dockerfile: Dockerfile
    container_name: fitness-activityservice
    ports:
      - "8082:8082"
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://configserver:8888
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/fitnessactivity
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      configserver:
        condition: service_healthy
    networks:
      - fitness-network

  aiservice:
    build:
      context: ./aiservice
      dockerfile: Dockerfile
    container_name: fitness-aiservice
    ports:
      - "8083:8083"
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://configserver:8888
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/fitnessrecommendations
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
      HUGGINGFACE_API_KEY: ${HUGGINGFACE_API_KEY:-YOUR_HUGGINGFACE_TOKEN_HERE}
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      configserver:
        condition: service_healthy
    networks:
      - fitness-network

  frontend:
    build:
      context: ./fitness-app-frontend
      dockerfile: Dockerfile
    container_name: fitness-frontend
    ports:
      - "3000:80"
    depends_on:
      - gateway
    networks:
      - fitness-network

# ─────────────────────────────────────────────
# VOLUMES & NETWORKS
# ─────────────────────────────────────────────

volumes:
  postgres-data:
  mongo-data:
  rabbitmq-data:

networks:
  fitness-network:
    driver: bridge
