services:

  # ─────────────────────────────────────────────
  # INFRASTRUCTURE
  # ─────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: fitness-postgres
    environment:
      POSTGRES_DB: fitness_user_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fitness-network

  mongodb:
    image: mongo:7-jammy
    container_name: fitness-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fitness-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: fitness-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fitness-network

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: fitness-keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/fitness_user_db
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
    ports:
      - "8181:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fitness-network

  # ─────────────────────────────────────────────
  # PLATFORM SERVICES
  # ─────────────────────────────────────────────

  eureka:
    build:
      context: ./eureka
      dockerfile: Dockerfile
    container_name: fitness-eureka
    ports:
      - "8761:8761"
    labels:
      logging: "promtail"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8761/actuator/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - fitness-network

  configserver:
    build:
      context: ./configserver
      dockerfile: Dockerfile
    container_name: fitness-configserver
    ports:
      - "8888:8888"
    labels:
      logging: "promtail"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
    depends_on:
      eureka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8888/actuator/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - fitness-network

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: fitness-gateway
    ports:
      - "8080:8080"
    labels:
      logging: "promtail"
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://configserver:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/fitness-oauth2/protocol/openid-connect/certs
    depends_on:
      configserver:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - fitness-network

  userservice:
    build:
      context: ./userservice
      dockerfile: Dockerfile
    container_name: fitness-userservice
    ports:
      - "8081:8081"
    labels:
      logging: "promtail"
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://configserver:8888
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/fitness_user_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
    depends_on:
      postgres:
        condition: service_healthy
      configserver:
        condition: service_healthy
    networks:
      - fitness-network

  activityservice:
    build:
      context: ./activityservice
      dockerfile: Dockerfile
    container_name: fitness-activityservice
    ports:
      - "8082:8082"
    labels:
      logging: "promtail"
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://configserver:8888
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/fitnessactivity
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      configserver:
        condition: service_healthy
    networks:
      - fitness-network

  aiservice:
    build:
      context: ./aiservice
      dockerfile: Dockerfile
    container_name: fitness-aiservice
    ports:
      - "8083:8083"
    labels:
      logging: "promtail"
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://configserver:8888
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/fitnessrecommendations
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
      GROQ_API_KEY: ${GROQ_API_KEY:-YOUR_GROQ_API_KEY_HERE}
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      configserver:
        condition: service_healthy
    networks:
      - fitness-network

  frontend:
    build:
      context: ./fitness-app-frontend
      dockerfile: Dockerfile
    container_name: fitness-frontend
    ports:
      - "3000:80"
    labels:
      logging: "promtail"
    depends_on:
      - gateway
    networks:
      - fitness-network

  # ─────────────────────────────────────────────
  # OBSERVABILITY — PLG Stack & Zipkin
  # ─────────────────────────────────────────────

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: fitness-zipkin
    ports:
      - "9411:9411"
    networks:
      - fitness-network

  loki:
    image: grafana/loki:3.0.0
    container_name: fitness-loki
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - fitness-network

  promtail:
    image: grafana/promtail:3.0.0
    container_name: fitness-promtail
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - fitness-network

  grafana:
    image: grafana/grafana:11.0.0
    container_name: fitness-grafana
    ports:
      - "4000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    depends_on:
      - loki
    networks:
      - fitness-network

# ─────────────────────────────────────────────
# VOLUMES & NETWORKS
# ─────────────────────────────────────────────

volumes:
  postgres-data:
  mongo-data:
  rabbitmq-data:
  loki-data:
  grafana-data:

networks:
  fitness-network:
    driver: bridge
